<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>창세기 말씀 시리즈 — 부산교회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep: #0d0b1a;
    --indigo: #1a1535;
    --violet: #2a2050;
    --star-gold: #e8c96a;
    --star-warm: #f0d98a;
    --cream: #f5f0e8;
    --cream-dim: rgba(245, 240, 232, 0.7);
    --cream-faint: rgba(245, 240, 232, 0.35);
    --accent: #c8a030;
    --border: rgba(232, 201, 106, 0.18);
    --border-hover: rgba(232, 201, 106, 0.5);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Serif KR', serif;
    background: var(--deep);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 별 캔버스 ── */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── 전체 레이아웃 ── */
  .page {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1.5rem 6rem;
  }

  /* ── 헤더 ── */
  header {
    text-align: center;
    padding: 5rem 0 3.5rem;
  }

  .church-label {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.78rem;
    font-weight: 300;
    letter-spacing: 0.35em;
    color: var(--star-gold);
    text-transform: uppercase;
    margin-bottom: 1.4rem;
    opacity: 0.85;
  }

  .title-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 1.2rem;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 600;
    color: var(--star-gold);
    letter-spacing: 0.08em;
    line-height: 1;
    text-shadow: 0 0 60px rgba(232, 201, 106, 0.3);
  }

  .title-kr {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(0.85rem, 2vw, 1rem);
    font-weight: 300;
    letter-spacing: 0.5em;
    color: var(--cream-dim);
    margin-top: 0.7rem;
    display: block;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    justify-content: center;
    margin: 2rem auto 1.5rem;
    width: 260px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--star-gold));
  }
  .divider-line:last-child {
    background: linear-gradient(to left, transparent, var(--star-gold));
  }

  .divider-star {
    font-size: 1rem;
    color: var(--star-gold);
    opacity: 0.9;
  }

  .subtitle {
    font-size: 0.88rem;
    font-weight: 300;
    color: var(--cream-dim);
    letter-spacing: 0.12em;
    line-height: 1.8;
  }

  /* ── 목록 그리드 ── */
  .series-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    margin-top: 3rem;
  }

  /* ── 카드 ── */
  .card {
    position: relative;
    display: flex;
    flex-direction: column;
    background: rgba(26, 21, 53, 0.6);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.4rem 1.4rem 1.2rem;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: border-color 0.35s, background 0.35s, transform 0.25s;
    overflow: hidden;
    backdrop-filter: blur(4px);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top right, rgba(232, 201, 106, 0.06) 0%, transparent 65%);
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }

  .card:hover {
    border-color: var(--border-hover);
    background: rgba(42, 32, 80, 0.75);
    transform: translateY(-3px);
  }

  .card:hover::before {
    opacity: 1;
  }

  .card-num {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--star-gold);
    opacity: 0.7;
    margin-bottom: 0.6rem;
  }

  .card-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.55;
    flex: 1;
  }

  .card-chapter {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--star-gold);
    opacity: 0.65;
    margin-top: 0.8rem;
    letter-spacing: 0.04em;
  }

  .card-arrow {
    position: absolute;
    bottom: 1.2rem;
    right: 1.2rem;
    width: 22px;
    height: 22px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s, background 0.3s;
  }

  .card:hover .card-arrow {
    border-color: var(--star-gold);
    background: rgba(232, 201, 106, 0.1);
  }

  .card-arrow svg {
    width: 10px;
    height: 10px;
    stroke: var(--star-gold);
    opacity: 0.7;
    transition: opacity 0.3s;
  }
  .card:hover .card-arrow svg { opacity: 1; }

  /* ── 빛나는 구분선 ── */
  .section-break {
    text-align: center;
    margin: 3.5rem 0 1.5rem;
    color: var(--star-gold);
    font-size: 0.72rem;
    letter-spacing: 0.4em;
    font-weight: 300;
    opacity: 0.6;
  }

  /* ── 푸터 ── */
  footer {
    text-align: center;
    padding-top: 4rem;
    border-top: 1px solid var(--border);
    margin-top: 4rem;
  }

  .footer-church {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.8rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: var(--star-gold);
    opacity: 0.7;
    margin-bottom: 0.4rem;
  }

  .footer-series {
    font-size: 0.72rem;
    color: var(--cream-faint);
    letter-spacing: 0.2em;
  }

  /* ── 반응형 ── */
  @media (max-width: 600px) {
    .series-grid {
      grid-template-columns: 1fr;
    }
    header { padding: 3.5rem 0 2.5rem; }
  }

  /* ── 카드 등장 애니메이션 ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeUp 0.5s both; }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="page">

  <header>
    <p class="church-label">부산교회 · Busan Church</p>
    <div class="title-wrap">
      <h1>GENESIS</h1>
      <span class="title-kr">창 세 기 말 씀 시 리 즈</span>
    </div>
    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-star">✦</span>
      <span class="divider-line"></span>
    </div>
    <p class="subtitle">태초에 하나님이 천지를 창조하시니라<br>창세기 1장 1절</p>
  </header>

  <div class="series-grid" id="grid"></div>

  <footer>
    <p class="footer-church">부 산 교 회</p>
    <p class="footer-series">창세기 말씀 시리즈 · Genesis Bible Series</p>
  </footer>

</div>

<script>
const BASE = 'https://kidori777.github.io/genesis/';

const items = [
  { file: '창세기 1-2장 태초의 경륜.html',              label: '태초의 경륜',          chapter: '창세기 1–2장' },
  { file: '창세기 3장 에덴의 타락.html',                label: '에덴의 타락',          chapter: '창세기 3장' },
  { file: '창세기 4장 가인과 아벨.html',                label: '가인과 아벨',          chapter: '창세기 4장' },
  { file: '창세기 5-9장 죽음의 계보 속에 숨겨진 한 줄기 길....html', label: '죽음의 계보 속에 숨겨진 한 줄기 길', chapter: '창세기 5–9장' },
  { file: '창세기 10-13장 바벨과 아브라함.html',        label: '바벨과 아브라함',      chapter: '창세기 10–13장' },
  { file: '창세기 14-15장 아브람-한 사람의 선택.html',  label: '아브람, 한 사람의 선택', chapter: '창세기 14–15장' },
  { file: '창세기 15-17장 20-21장 약속으로 난 생명.html', label: '약속으로 난 생명',  chapter: '창세기 15–17, 20–21장' },
  { file: '창세기 18-19장 하나님의 방문 약속 심판.html', label: '하나님의 방문, 약속, 심판', chapter: '창세기 18–19장' },
  { file: '창세기 22-23장 여호와이레.html',             label: '여호와이레',           chapter: '창세기 22–23장' },
  { file: '창세기 24장 이어지는 생명.html',             label: '이어지는 생명',        chapter: '창세기 24장' },
  { file: '창세기 25-26장 세대를 잇는 약속.html',       label: '세대를 잇는 약속',     chapter: '창세기 25–26장' },
  { file: '창세기 27-28 야곱-입혀진 자.html',           label: '야곱, 입혀진 자',      chapter: '창세기 27–28장' },
  { file: '창세기 29-31장 닫힌 우물이 열릴 때.html',    label: '닫힌 우물이 열릴 때',  chapter: '창세기 29–31장' },
  { file: '창세기 32-33장 야곱.html',                   label: '야곱',                 chapter: '창세기 32–33장' },
  { file: '창세기 34-35장 디나 벧엘 이스라엘.html',     label: '디나, 벧엘, 이스라엘', chapter: '창세기 34–35장' },
  { file: '창세기 36-38장 생명의 흐름.html',            label: '생명의 흐름',          chapter: '창세기 36–38장' },
  { file: '창세기 39-41장 요셉.html',                   label: '요셉',                 chapter: '창세기 39–41장' },
  { file: '창세기 42-47장 하나님의 경륜.html',          label: '하나님의 경륜',        chapter: '창세기 42–47장' },
  { file: '창세기 48-50장 문이 열리다.html',            label: '문이 열리다',          chapter: '창세기 48–50장' },
];

const grid = document.getElementById('grid');

items.forEach((item, i) => {
  const a = document.createElement('a');
  a.href = BASE + encodeURIComponent(item.file);
  a.target = '_blank';
  a.rel = 'noopener';
  a.className = 'card';
  a.style.animationDelay = (i * 0.045) + 's';

  const num = String(i + 1).padStart(2, '0');
  a.innerHTML = `
    <span class="card-num">No. ${num}</span>
    <span class="card-title">${item.label}</span>
    <span class="card-chapter">${item.chapter}</span>
    <span class="card-arrow">
      <svg viewBox="0 0 10 10" fill="none" stroke-width="1.5" stroke-linecap="round">
        <line x1="2" y1="5" x2="8" y2="5"/>
        <polyline points="5.5,2.5 8,5 5.5,7.5"/>
      </svg>
    </span>
  `;
  grid.appendChild(a);
});

/* ── 별 배경 ── */
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    const N = Math.floor((W * H) / 4500);
    for (let i = 0; i < N; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.003 + 0.001,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 0.016;
    stars.forEach(s => {
      const alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(240, 217, 138, ${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  resize();
  initStars();
  draw();
  window.addEventListener('resize', () => { resize(); initStars(); });
})();
</script>
</body>
</html>
